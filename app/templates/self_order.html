<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Now - IdeaHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .order-container {
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 15px 15px 0 0;
      text-align: center;
    }
    .menu-item {
      padding: 15px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-item:last-child {
      border-bottom: none;
    }
    .item-name {
      font-weight: 500;
    }
    .item-price {
      color: #667eea;
      font-weight: bold;
    }
    .qty-input {
      width: 70px;
    }
    .cart-item {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge-warning {
      background: #ffc107 !important;
      color: black;
    }
  </style>
</head>

<body>

  <div class="order-container">
    <div class="card">
      <div class="header">
        <h2>IdeaHub</h2>
        <p class="mb-0">{{ space_name }}</p>
      </div>

      <div class="card-body">
        <h5 class="mb-4">Browse Menu</h5>

        <div id="menu-items-list">
          {% for item in menu_items %}
          <div class="menu-item">
            <div>
              <div class="item-name">{{ item.name }}</div>
              <div class="item-price">₱{{ "%.2f"|format(item.price) }}</div>
            </div>
            <input type="number" class="qty-input form-control" min="0" value="0" data-item-id="{{ item.id }}" data-item-name="{{ item.name }}" data-item-price="{{ item.price }}" onchange="updateCart()">
          </div>
          {% endfor %}
        </div>

        <hr>

        <h5 class="mb-3">Your Order</h5>
        <div id="cart-items"></div>

        <hr>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <strong>Total:</strong>
          <strong class="text-warning" style="font-size: 1.2em;">₱<span id="total-price">0.00</span></strong>
        </div>

        <div class="mb-3">
          <label class="form-label">Your Name</label>
          <input type="text" id="customerName" class="form-control" placeholder="Walk-in">
        </div>

        <button class="btn btn-warning btn-lg w-100" onclick="submitOrder()">
          <i class="bi bi-check-circle"></i> Submit Order
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = "{{ token }}";
    const spaceId = {{ space_id }};

    function updateCart() {
      const inputs = document.querySelectorAll('.qty-input');
      const cart = [];
      let totalPrice = 0;
      let hasItems = false;

      inputs.forEach(input => {
        const qty = parseInt(input.value) || 0;
        if (qty > 0) {
          hasItems = true;
          const itemId = parseInt(input.dataset.itemId);
          const itemName = input.dataset.itemName;
          const itemPrice = parseFloat(input.dataset.itemPrice);
          cart.push({
            item_id: itemId,
            quantity: qty,
            name: itemName,
            price: itemPrice,
          });
          totalPrice += qty * itemPrice;
        }
      });

      const cartDiv = document.getElementById('cart-items');
      if (hasItems) {
        cartDiv.innerHTML = cart.map(item =>
          `<div class="cart-item">
             <span>${item.name} x${item.quantity}</span>
             <span>₱${(item.quantity * item.price).toFixed(2)}</span>
           </div>`
        ).join('');
      } else {
        cartDiv.innerHTML = '<p class="text-muted">No items selected</p>';
      }

      document.getElementById('total-price').textContent = totalPrice.toFixed(2);
    }

    function submitOrder() {
      const inputs = document.querySelectorAll('.qty-input');
      const items = [];

      inputs.forEach(input => {
        const qty = parseInt(input.value) || 0;
        if (qty > 0) {
          items.push({
            item_id: parseInt(input.dataset.itemId),
            quantity: qty,
          });
        }
      });

      if (items.length === 0) {
        alert('Please select at least one item');
        return;
      }

      const payload = {
        customer_name: document.getElementById('customerName').value || 'Walk-in',
        items: items,
      };

      fetch(`/order/${token}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(r => r.json()).then(data => {
        if (data.success) {
          alert('Order submitted! Order ID: ' + data.data.order_id);
          window.location.reload();
        } else {
          alert('Error submitting order: ' + (data.error || 'Unknown error'));
        }
      }).catch(e => {
        alert('Error: ' + e.message);
      });
    }

    document.addEventListener('DOMContentLoaded', updateCart);
  </script>

</body>

</html>
